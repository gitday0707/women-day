<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title> ❤️</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div id="intro"></div>

      <div id="playerBox" class="hidden">
        <div class="player">
          <div class="song-info">
            <div class="cover"></div>
            <div>
              <div class="title">I LOVE YOU</div>
              <div class="artist">Bùi Công Nam</div>
            </div>
          </div>

          <audio id="audio">
            <source src="song.mp3" type="audio/mpeg" />
          </audio>

          <div class="controls">
            <button id="playBtn">▶</button>
            <div id="progressContainer">
              <div id="progressBar"></div>
            </div>
          </div>
        </div>

        <div id="lyrics"></div>
      </div>

      <div id="ending"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
